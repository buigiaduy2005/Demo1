# ============================================================
# Nginx config: InsiderThreat System
# Domain: tuyen-thda.io.vn
# Server: 150.95.104.244
# Upload to: /etc/nginx/sites-available/insiderthreat
# ============================================================

# ── Redirect HTTP → HTTPS ────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name tuyen-thda.io.vn www.tuyen-thda.io.vn;
    return 301 https://$host$request_uri;
}

# ── HTTPS Server ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tuyen-thda.io.vn www.tuyen-thda.io.vn;

    # SSL Certificate (từ Cloudflare Origin Certificate)
    ssl_certificate     /etc/ssl/insiderthreat.crt;
    ssl_certificate_key /etc/ssl/insiderthreat.key;

    # SSL Settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         'HIGH:!aNULL:!MD5:!3DES';
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Frontend (React/Vite build) ──────────────────────
    root /var/www/insiderthreat-web;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }
    }

    # ── Backend API (.NET on port 5000) ──────────────────
    location /api/ {
        proxy_pass         http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Connection        keep-alive;
        proxy_cache_bypass $http_upgrade;

        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Max upload size (cho upload ảnh)
        client_max_body_size 20M;
    }

    # ── SignalR WebSocket Hubs ────────────────────────────
    location /hubs/ {
        proxy_pass         http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Test DB endpoint (tùy chọn, nên xóa sau khi test) ─
    location /test-db {
        proxy_pass http://localhost:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── Ảnh upload qua GridFS stream ─────────────────────
    location /uploads/ {
        proxy_pass         http://localhost:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto https;
        client_max_body_size 20M;
    }

    # ── Gzip compression ─────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
}
